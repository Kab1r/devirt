name: Verify

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  VERUS_TAG: release/0.2026.04.03.21dfcd2

permissions:
  contents: read

jobs:
  kani:
    name: Kani
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Cache Kani
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: cache-kani
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.kani
          key: kani-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Install Kani
        if: steps.cache-kani.outputs.cache-hit != 'true'
        run: |
          cargo install kani-verifier --locked
          cargo kani setup
      - run: cargo kani --tests -p devirt

  verus:
    name: Verus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Cache Verus
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: cache-verus
        with:
          path: ~/.verus
          key: verus-${{ env.VERUS_TAG }}-${{ runner.os }}
      - name: Install Verus
        if: steps.cache-verus.outputs.cache-hit != 'true'
        run: |
          VERSION="${VERUS_TAG#release/}"
          curl -fsSL "https://github.com/verus-lang/verus/releases/download/${VERUS_TAG}/verus-${VERSION}-x86-linux.zip" -o verus.zip
          mkdir -p ~/.verus
          unzip -q verus.zip -d ~/.verus
      - name: Determine Rust toolchain required by Verus
        # Verus ships as a prebuilt binary that shells out to a specific rustc
        # via rustup — `stable` is not sufficient and the required version
        # changes across releases. Read it from the release's version.json
        # so that Renovate only has to bump `VERUS_TAG`.
        id: verus-toolchain
        run: |
          toolchain=$(jq -r '.verus.toolchain' ~/.verus/verus-x86-linux/version.json)
          toolchain="${toolchain%-x86_64-unknown-linux-gnu}"
          echo "toolchain=$toolchain" >> "$GITHUB_OUTPUT"
      - name: Install Rust toolchain required by Verus
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.verus-toolchain.outputs.toolchain }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Add Verus to PATH
        # The release zip extracts to a `verus-x86-linux/` subdirectory that
        # contains the `verus` binary alongside its runtime assets (z3,
        # libvstd.rlib, vstd.vir, etc.). The binary must stay next to those
        # files, so we add the subdirectory itself to PATH.
        run: echo "$HOME/.verus/verus-x86-linux" >> "$GITHUB_PATH"
      - run: verus crates/verify/src/lib.rs --crate-type=lib

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo install cargo-fuzz
      - run: cargo +nightly fuzz run dispatch -- -max_total_time=300
