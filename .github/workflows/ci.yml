name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Kept in sync with the `vstd` crate version in Cargo.toml by Renovate
  # (see .github/renovate.json5 — the `verus` group bundles the two updates).
  VERUS_TAG: release/0.2026.01.30.44ebdee

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --workspace --exclude devirt-fuzz

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace --exclude devirt-fuzz --all-targets -- -D warnings

  bench-check:
    name: Bench compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo bench --workspace --exclude devirt-fuzz --no-run

  fuzz-build:
    name: Fuzz build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo install cargo-fuzz
      - run: cargo +nightly fuzz build dispatch

  kani:
    name: Kani
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Cache Kani
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: cache-kani
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.kani
          key: kani-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Install Kani
        if: steps.cache-kani.outputs.cache-hit != 'true'
        run: |
          cargo install kani-verifier --locked
          cargo kani setup
      - run: cargo kani --tests -p devirt

  verus:
    name: Verus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Verus ships as a prebuilt binary that shells out to a specific rustc
      # via rustup. The required toolchain is pinned in the release's
      # version.json and must match exactly — `stable` is not sufficient.
      - name: Install Rust toolchain required by Verus
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.93.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Cache Verus
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: cache-verus
        with:
          path: ~/.verus
          key: verus-${{ env.VERUS_TAG }}-${{ runner.os }}
      - name: Install Verus
        if: steps.cache-verus.outputs.cache-hit != 'true'
        run: |
          VERSION="${VERUS_TAG#release/}"
          curl -fsSL "https://github.com/verus-lang/verus/releases/download/${VERUS_TAG}/verus-${VERSION}-x86-linux.zip" -o verus.zip
          mkdir -p ~/.verus
          unzip -q verus.zip -d ~/.verus
      - name: Add Verus to PATH
        # The release zip extracts to a `verus-x86-linux/` subdirectory that
        # contains the `verus` binary alongside its runtime assets (z3,
        # libvstd.rlib, vstd.vir, etc.). The binary must stay next to those
        # files, so we add the subdirectory itself to PATH.
        run: echo "$HOME/.verus/verus-x86-linux" >> "$GITHUB_PATH"
      - run: verus crates/verify/src/lib.rs --crate-type=lib
